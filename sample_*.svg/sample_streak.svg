<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195">
<style>
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes cu{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.sc{opacity:0;animation:fi .5s ease forwards}
.bn{opacity:0;animation:cu .4s ease forwards;transform-origin:center}
</style>
<rect x="0.5" y="0.5" width="494" height="194" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
<text x="247.5" y="30" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="700" font-family="Segoe UI,Ubuntu,sans-serif">octocat&apos;s Streak Stats</text>
<g class="sc" style="animation-delay:0ms" transform="translate(82,60)"><text y="0" text-anchor="middle" fill="#8b949e" font-size="13" font-family="Segoe UI,Ubuntu,sans-serif">Total Contributions</text><g class="bn" style="animation-delay:100ms"><text x="0" y="42" text-anchor="middle" fill="#c9d1d9" font-size="38" font-weight="800" font-family="Segoe UI,Ubuntu,sans-serif">0</text></g><text y="68" text-anchor="middle" fill="#8b949e" font-size="11" font-family="Segoe UI,Ubuntu,sans-serif">All Time</text></g>
<line x1="165" y1="42" x2="165" y2="168" stroke="#30363d" stroke-width="1" stroke-opacity="0.5"/>
<g class="sc" style="animation-delay:150ms" transform="translate(248,60)"><text y="0" text-anchor="middle" fill="#8b949e" font-size="13" font-family="Segoe UI,Ubuntu,sans-serif">Current Streak</text><g class="bn" style="animation-delay:250ms"><text x="0" y="42" text-anchor="middle" fill="#c9d1d9" font-size="38" font-weight="800" font-family="Segoe UI,Ubuntu,sans-serif">0</text></g><text y="68" text-anchor="middle" fill="#8b949e" font-size="11" font-family="Segoe UI,Ubuntu,sans-serif"></text></g>
<line x1="330" y1="42" x2="330" y2="168" stroke="#30363d" stroke-width="1" stroke-opacity="0.5"/>
<g class="sc" style="animation-delay:300ms" transform="translate(412,60)"><text y="0" text-anchor="middle" fill="#8b949e" font-size="13" font-family="Segoe UI,Ubuntu,sans-serif">Longest Streak</text><g class="bn" style="animation-delay:400ms"><text x="0" y="42" text-anchor="middle" fill="#c9d1d9" font-size="38" font-weight="800" font-family="Segoe UI,Ubuntu,sans-serif">0</text></g><text y="68" text-anchor="middle" fill="#8b949e" font-size="11" font-family="Segoe UI,Ubuntu,sans-serif"></text></g>
</svg>