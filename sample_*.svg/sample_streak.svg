<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195">
  
    <style>
      @keyframes fadeIn { from {opacity:0;transform:translateY(6px)} to {opacity:1;transform:translateY(0)} }
      @keyframes countUp { from {opacity:0;transform:scale(.5)} to {opacity:1;transform:scale(1)} }
      .streak-col { opacity:0; animation: fadeIn .5s ease forwards; }
      .big-num { opacity:0; animation: countUp .4s ease forwards; transform-origin:center; }
    </style>
  <rect x="0.5" y="0.5" width="494" height="194" rx="10" ry="10"
    fill="#141321" stroke="#443760" stroke-width="1" />
  <text x="247.5" y="25" text-anchor="middle" fill="#fe428e" font-size="16" font-weight="700"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">OstinUA's Streak Stats</text>
    <g class="streak-col" style="animation-delay:0ms" transform="translate(82, 55)">
      <text y="0" text-anchor="middle" fill="#a9fef7" font-size="12"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">Total Contributions</text>
      <g class="big-num" style="animation-delay:100ms">
        <text y="50" text-anchor="middle" fill="#a9fef7" font-size="36" font-weight="800"
          font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">2.3k</text>
      </g>
      <text y="75" text-anchor="middle" fill="#a9fef7" font-size="10"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">All Time</text>
    </g>
    <line x1="165" y1="35" x2="165" y2="165" stroke="#443760" stroke-width="1" />
    <g class="streak-col" style="animation-delay:150ms" transform="translate(248, 55)">
      <text y="0" text-anchor="middle" fill="#a9fef7" font-size="12"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">Current Streak</text>
      <g class="big-num" style="animation-delay:250ms">
        <text y="50" text-anchor="middle" fill="#a9fef7" font-size="36" font-weight="800"
          font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">12</text>
      </g>
      <text y="75" text-anchor="middle" fill="#a9fef7" font-size="10"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">N/A</text>
    </g>
    <line x1="330" y1="35" x2="330" y2="165" stroke="#443760" stroke-width="1" />
    <g class="streak-col" style="animation-delay:300ms" transform="translate(412, 55)">
      <text y="0" text-anchor="middle" fill="#a9fef7" font-size="12"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">Longest Streak</text>
      <g class="big-num" style="animation-delay:400ms">
        <text y="50" text-anchor="middle" fill="#a9fef7" font-size="36" font-weight="800"
          font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">47</text>
      </g>
      <text y="75" text-anchor="middle" fill="#a9fef7" font-size="10"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">N/A</text>
    </g>
</svg>