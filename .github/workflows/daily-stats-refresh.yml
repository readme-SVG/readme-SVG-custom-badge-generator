name: Daily SVG stats refresh

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate SVG samples
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SVG_STATS_USERNAME: ${{ github.repository_owner }}
          SVG_STATS_THEME: dark
        run: python scripts/refresh_sample_svgs.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sample_*.svg/*.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh SVG stats cards"
          git push
